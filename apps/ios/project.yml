name: WineryClaw
options:
  bundleIdPrefix: ai.openclaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  WineryClawKit:
    path: ../shared/WineryClawKit
  Swabble:
    path: ../../Swabble

schemes:
  WineryClaw:
    shared: true
    build:
      targets:
        WineryClaw: all
    test:
      targets:
        - WineryClawTests
        - WineryClawLogicTests
  WineryClawLogicTests:
    shared: true
    build:
      targets:
        WineryClawLogicTests: all
    test:
      targets:
        - WineryClawLogicTests

targets:
  WineryClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: WineryClawShareExtension
        embed: true
      - target: WineryClawActivityWidget
        embed: true
      - target: WineryClawWatchApp
      - package: WineryClawKit
      - package: WineryClawKit
        product: WineryClawChatUI
      - package: WineryClawKit
        product: WineryClawProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/WineryClaw.entitlements
        CODE_SIGN_STYLE: "$(WINERYCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(WINERYCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(WINERYCLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(WINERYCLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          WINERYCLAW_PUSH_TRANSPORT: direct
          WINERYCLAW_PUSH_DISTRIBUTION: local
          WINERYCLAW_PUSH_RELAY_BASE_URL: ""
          WINERYCLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          WINERYCLAW_PUSH_TRANSPORT: direct
          WINERYCLAW_PUSH_DISTRIBUTION: local
          WINERYCLAW_PUSH_RELAY_BASE_URL: ""
          WINERYCLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: WineryClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.openclaw.ios
            CFBundleURLSchemes:
              - openclaw
        CFBundleShortVersionString: "$(WINERYCLAW_MARKETING_VERSION)"
        WineryClawCanonicalVersion: "$(WINERYCLAW_IOS_VERSION)"
        CFBundleVersion: "$(WINERYCLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.openclaw.ios.bgrefresh
        NSLocalNetworkUsageDescription: WineryClaw discovers and connects to your WineryClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _openclaw-gw._tcp
        NSCameraUsageDescription: WineryClaw can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: WineryClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: WineryClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: WineryClaw needs microphone access for voice wake.
        NSMotionUsageDescription: WineryClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: WineryClaw needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: WineryClaw uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        WineryClawPushTransport: "$(WINERYCLAW_PUSH_TRANSPORT)"
        WineryClawPushDistribution: "$(WINERYCLAW_PUSH_DISTRIBUTION)"
        WineryClawPushRelayBaseURL: "$(WINERYCLAW_PUSH_RELAY_BASE_URL)"
        WineryClawPushAPNsEnvironment: "$(WINERYCLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  WineryClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: WineryClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(WINERYCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(WINERYCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(WINERYCLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(WINERYCLAW_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: WineryClaw Share
        CFBundleShortVersionString: "$(WINERYCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(WINERYCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  WineryClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/WineryClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(WINERYCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(WINERYCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(WINERYCLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: WineryClaw Activity
        CFBundleShortVersionString: "$(WINERYCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(WINERYCLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  WineryClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: WineryClawWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(WINERYCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(WINERYCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(WINERYCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(WINERYCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(WINERYCLAW_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(WINERYCLAW_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: WineryClaw
        CFBundleShortVersionString: "$(WINERYCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(WINERYCLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(WINERYCLAW_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  WineryClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(WINERYCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(WINERYCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(WINERYCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(WINERYCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(WINERYCLAW_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(WINERYCLAW_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: WineryClaw
        CFBundleShortVersionString: "$(WINERYCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(WINERYCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(WINERYCLAW_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  WineryClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: WineryClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(WINERYCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(WINERYCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.openclaw.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WineryClaw.app/WineryClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: WineryClawTests
        CFBundleShortVersionString: "$(WINERYCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(WINERYCLAW_BUILD_VERSION)"

  WineryClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: WineryClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(WINERYCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(WINERYCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.openclaw.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: WineryClawLogicTests
        CFBundleShortVersionString: "$(WINERYCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(WINERYCLAW_BUILD_VERSION)"
